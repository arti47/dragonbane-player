<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7a2e1d" />
  <title>Dragonbane Player</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <span class="brand"><img src="icon.svg" alt="" /> Dragonbane</span>
      <span class="spacer"></span>
      <span id="sync-status" class="status-pill local" title="Data storage mode">Local</span>
      <button id="theme-toggle" class="icon-btn" title="Toggle light/dark" aria-label="Toggle theme">☾</button>
    </header>

    <main id="screen" class="app-main">
      <!-- Screens are rendered here by app.js -->
    </main>

    <nav class="app-nav" id="app-nav" aria-label="Main">
      <button data-route="home" class="active" aria-current="page"><span class="ico" aria-hidden="true">⚔</span>Heroes</button>
      <button data-route="party"><span class="ico" aria-hidden="true">🛡</span>Combat</button>
      <button data-route="solo"><span class="ico" aria-hidden="true">🧭</span>Solo</button>
      <button data-route="gm" style="display:none"><span class="ico" aria-hidden="true">🎲</span>GM</button>
      <button data-route="rules"><span class="ico" aria-hidden="true">📖</span>Rules</button>
      <button data-route="about"><span class="ico" aria-hidden="true">⚙</span>About</button>
    </nav>
  </div>

  <!-- Rules library (global DRAGONBANE) must load before the app -->
  <script src="data.js"></script>
  <script src="data-magic.js"></script>
  <script src="data-pregens.js"></script>
  <script src="data-solo.js"></script>
  <script src="data-monsters.js"></script>
  <script src="data-npcs.js"></script>

  <!-- Firebase 10 Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script src="firebase-config.js"></script>
  <!-- App logic, split into ES modules (see CLAUDE.md §5). main.js is the entry point. -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
